{% extends "base.html" %}
{% block title %}Study – {{ deck.title }} – StudyForce{% endblock %}

{% block extra_css %}
<style>
  .study-viewport { max-width: 680px; margin: 0 auto; }
  .progress-bar-study { height: 6px; background: var(--border); border-radius: 3px; margin-bottom: 2rem; overflow: hidden; }
  .progress-bar-study-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.4s; }

  /* 3D flip card */
  .flip-scene { perspective: 1200px; width: 100%; height: 280px; cursor: pointer; margin-bottom: 1.5rem; }
  .flip-card  { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); }
  .flip-card.flipped { transform: rotateY(180deg); }
  .flip-face  {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem; text-align: center; font-size: 1.1rem; font-weight: 500;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    user-select: none;
  }
  .flip-face.back { transform: rotateY(180deg); }

  .flip-hint { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 1.5rem; }

  /* Rating buttons */
  .rating-buttons { display: grid; grid-template-columns: repeat(4,1fr); gap: 0.5rem; }
  .rating-btn {
    border: none; border-radius: 10px; padding: 0.75rem 0.4rem;
    cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: transform 0.15s, opacity 0.15s;
    color: #fff;
  }
  .rating-btn:active { transform: scale(0.95); }
  .rating-again { background: #e74c3c; }
  .rating-hard  { background: #e67e22; }
  .rating-good  { background: #27ae60; }
  .rating-easy  { background: #2980b9; }

  .session-done { text-align:center; padding:3rem 1rem; }
</style>
{% endblock %}

{% block content %}
<div class="study-viewport">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
    <a href="{{ url_for('flashcards.deck_detail', deck_id=deck.id) }}" class="btn btn-glass btn-sm">← Exit</a>
    <h2 style="font-size:0.95rem; color:var(--text-muted);">{{ deck.title }}</h2>
    <span id="card-counter" style="font-size:0.85rem; color:var(--text-muted);">0 / 0</span>
  </div>

  <div class="progress-bar-study"><div class="progress-bar-study-fill" id="progress-fill" style="width:0;"></div></div>

  <div id="study-area">
    <!-- Dynamically filled by JS -->
  </div>

  <div id="session-done" class="session-done glass" style="display:none;">
    <div style="font-size:3rem; margin-bottom:0.5rem;"><i data-lucide="sparkles"></i></div>
    <h2 style="margin-bottom:0.5rem;">Session complete!</h2>
    <p style="color:var(--text-muted); margin-bottom:1.5rem;">All cards reviewed.</p>
    <div style="display:flex; gap:0.75rem; justify-content:center;">
      <a href="{{ url_for('flashcards.deck_detail', deck_id=deck.id) }}" class="btn btn-glass">Back to deck</a>
      <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">Dashboard</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/flashcard.js') }}" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const CARDS = {{ cards_json|safe }};
    initStudySession(CARDS, '{{ url_for("flashcards.rate_card") }}');
  });
</script>
{% endblock %}
