{% extends "auth/auth_base.html" %}
{% block title %}Forgot Password – StudyForce{% endblock %}

{% block auth_content %}
<div class="auth-logo">
  <div class="logo-emoji"><i data-lucide="key"></i></div>
  <h1>Reset password</h1>
  <p>We'll send you a reset link.</p>
</div>

{% if sent %}
  <div class="alert alert-success" role="alert">
    Check your inbox — a reset link has been sent.
  </div>
  <a href="{{ url_for('auth.login') }}" class="btn btn-glass w-full" style="text-align:center; display:block; margin-top:1rem;">Back to login</a>
{% else %}
  <form method="POST" action="{{ url_for('auth.forgot_password') }}" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="form-group">
      <label class="form-label" for="email">Your email</label>
      <input class="form-control" type="email" id="email" name="email" required
             autocomplete="email" placeholder="you@university.edu" />
    </div>
    <button type="submit" class="btn btn-primary w-full">Send reset link</button>
  </form>
  <div class="auth-footer">
    <a href="{{ url_for('auth.login') }}" class="text-accent">Back to login</a>
  </div>
{% endif %}
{% endblock %}
