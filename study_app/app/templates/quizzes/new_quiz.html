{% extends "base.html" %}
{% block title %}New Quiz – StudyForce{% endblock %}
{% block extra_css %}
<style>
  .q-card { border-left:3px solid var(--primary); }
  .option-row { display:flex; gap:0.5rem; align-items:center; margin-bottom:0.4rem; }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <a href="{{ url_for('quizzes.list') }}" class="btn btn-glass">← Back</a>
  <h1 class="page-title">Create a Quiz</h1>
</div>

<form method="POST" novalidate id="quiz-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

  <div class="glass p-4" style="margin-bottom:1rem;">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" for="title">Quiz title *</label>
        <input class="form-control" type="text" id="title" name="title" required maxlength="128" placeholder="e.g. Chapter 3 Revision" />
      </div>
      {% if subjects %}
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" for="subject_id">Subject</label>
        <select class="form-control" id="subject_id" name="subject_id">
          <option value="">— None —</option>
          {% for s in subjects %}<option value="{{ s.id }}">{{ s.icon }} {{ s.name }}</option>{% endfor %}
        </select>
      </div>
      {% endif %}
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr auto; gap:0.75rem; margin-top:0.75rem; align-items:end;">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" for="description">Description</label>
        <input class="form-control" type="text" id="description" name="description" maxlength="256" />
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" for="time_limit">Time limit (minutes, blank = none)</label>
        <input class="form-control" type="number" id="time_limit" name="time_limit" min="1" max="180" placeholder="e.g. 30" />
      </div>
      <div style="display:flex; align-items:center; gap:0.5rem; padding-bottom:0.1rem;">
        <input type="checkbox" id="is_public" name="is_public" />
        <label for="is_public" style="font-size:0.875rem; cursor:pointer; white-space:nowrap;">Make public</label>
      </div>
    </div>
  </div>

  <div id="questions-container"></div>

  <div style="display:flex; gap:0.5rem; margin-bottom:1.5rem;">
    <button type="button" class="btn btn-glass" onclick="addQuestion('mcq')">+ MCQ</button>
    <button type="button" class="btn btn-glass" onclick="addQuestion('true_false')">+ True/False</button>
    <button type="button" class="btn btn-glass" onclick="addQuestion('short_answer')">+ Short Answer</button>
  </div>

  <button type="submit" class="btn btn-primary">Create quiz</button>
</form>
{% endblock %}

{% block extra_js %}
<script>
  let qCount = 0;

  function addQuestion(type) {
    const i = qCount++;
    const container = document.getElementById('questions-container');
    let inner = '';

    if (type === 'mcq') {
      inner = `
        <div class="q-opts" id="opts-${i}">
          <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:0.4rem;">Options (mark correct with radio)</p>
          <div class="option-row" id="opt-row-${i}-0">
            <input type="radio" name="q_correct[${i}]" value="0" id="opt-radio-${i}-0" required />
            <input type="text" class="form-control" name="q_opts_${i}[]" placeholder="Option A" style="flex:1;" />
            <button type="button" class="btn btn-glass btn-sm" onclick="removeOpt(this)">✕</button>
          </div>
          <div class="option-row" id="opt-row-${i}-1">
            <input type="radio" name="q_correct[${i}]" value="1" id="opt-radio-${i}-1" />
            <input type="text" class="form-control" name="q_opts_${i}[]" placeholder="Option B" style="flex:1;" />
            <button type="button" class="btn btn-glass btn-sm" onclick="removeOpt(this)">✕</button>
          </div>
        </div>
        <button type="button" class="btn btn-glass btn-sm" style="margin-top:0.4rem;" onclick="addOpt(${i})">+ Add option</button>`;
    } else if (type === 'true_false') {
      inner = `
        <div style="display:flex; gap:1rem; margin-top:0.4rem;">
          <label><input type="radio" name="q_correct[${i}]" value="true"  required /> True</label>
          <label><input type="radio" name="q_correct[${i}]" value="false" /> False</label>
        </div>`;
    } else {
      inner = `
        <div class="form-group" style="margin-top:0.4rem; margin-bottom:0;">
          <label class="form-label">Expected answer (exact match, case-insensitive)</label>
          <input type="text" class="form-control" name="q_correct[${i}]" placeholder="e.g. photosynthesis" />
        </div>`;
    }

    const card = document.createElement('div');
    card.className = 'glass q-card p-4';
    card.style.marginBottom = '0.75rem';
    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
        <span style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase;">${type.replace('_',' ')} — Q${i+1}</span>
        <button type="button" class="btn btn-glass btn-sm" style="color:var(--danger);" onclick="this.closest('.glass').remove()">Remove</button>
      </div>
      <div class="form-group" style="margin-bottom:0.5rem;">
        <input type="text" class="form-control" name="q_text[]" placeholder="Question text…" required maxlength="512" />
        <input type="hidden" name="q_type[]" value="${type}" />
      </div>
      ${inner}`;
    container.appendChild(card);
    card.querySelector('[name="q_text[]"]').focus();
  }

  let optCounts = {};
  function addOpt(qi) {
    optCounts[qi] = (optCounts[qi] || 2);
    const idx = optCounts[qi]++;
    const container = document.getElementById(`opts-${qi}`);
    const row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = `
      <input type="radio" name="q_correct[${qi}]" value="${idx}" />
      <input type="text" class="form-control" name="q_opts_${qi}[]" placeholder="Option…" style="flex:1;" />
      <button type="button" class="btn btn-glass btn-sm" onclick="removeOpt(this)">✕</button>`;
    container.appendChild(row);
  }

  function removeOpt(btn) {
    const rows = btn.closest('.q-opts')?.querySelectorAll('.option-row');
    if (rows && rows.length <= 2) return;
    btn.closest('.option-row').remove();
  }

  // Add one MCQ by default
  addQuestion('mcq');
</script>
{% endblock %}
